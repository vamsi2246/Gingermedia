version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: media_pipeline
    ports:
      - "3306:3306"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mysql://root:rootpassword@db:3306/media_pipeline
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    command: sh -c "npx prisma db push && npm start"

  worker:
    build: .
    environment:
      - DATABASE_URL=mysql://root:rootpassword@db:3306/media_pipeline
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    command: npm run worker
